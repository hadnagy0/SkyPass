<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo"></div>
      <h2>Bine ai revenit!</h2>
      <div class="auth-logo-container" style="text-align: center; margin: 15px 0;">
        <img src="/assets/logo.png" alt="SkyPass Logo" style="height: 60px;" />
      </div>
      <p>Conectează-te pentru a gestiona zborurile și rezervările tale</p>
    </div>

    <form nz-form [formGroup]="loginForm" (ngSubmit)="submitForm()" class="login-form" nzLayout="vertical">
      <nz-form-item>
        <nz-form-label nzRequired>Adresă Email</nz-form-label>
        <nz-form-control nzErrorTip="Te rugăm să introduci un email valid! (ex: eve.holt@reqres.in)">
          <nz-input-group [nzPrefix]="prefixMail">
            <input type="email" nz-input formControlName="email" placeholder="ex: eve.holt@reqres.in" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Parolă</nz-form-label>
        <nz-form-control nzErrorTip="Te rugăm să introduci parola!">
          <nz-input-group [nzPrefix]="prefixLock" [nzSuffix]="suffixTemplate">
            <input [type]="passwordVisible ? 'text' : 'password'" nz-input formControlName="password" placeholder="••••••••" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <ng-template #prefixMail><span nz-icon nzType="mail"></span></ng-template>
      <ng-template #prefixLock><span nz-icon nzType="lock"></span></ng-template>
      <ng-template #suffixTemplate>
        <span nz-icon [nzType]="passwordVisible ? 'eye-invisible' : 'eye'" (click)="passwordVisible = !passwordVisible" style="cursor: pointer; color: #fff;"></span>
      </ng-template>

      <div class="form-actions">
        <label nz-checkbox formControlName="rememberMe">
          <span class="remember-label">Ține-mă minte</span>
        </label>
      </div>

      <button nz-button nzType="primary" nzBlock [nzLoading]="isLoading" class="btn-submit">
        Conectare
      </button>

      <div class="auth-footer">
        Nu ai cont încă? <a routerLink="/register">Creează un cont nou</a>
      </div>
    </form>
  </div>
</div>
